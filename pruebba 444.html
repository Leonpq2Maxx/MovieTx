<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>444</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .player-container {
            position: relative;
            width: 80%;
            max-width: 800px;
        }
        .video-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://image.tmdb.org/t/p/original/uvoZWNDDScxcygQ09EQOhhVWvQz.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        .video-bg.hidden {
            opacity: 0;
            pointer-events: none;
        }
        video {
            width: 100%;
            display: block;
        }
        .episodes {
            margin-top: 20px;
            width: 80%;
            max-width: 800px;
        }
        .episode {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            background: #0008ff;
            padding: 10px;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            transition: background 0.3s;
        }
        .episode:hover {
            background: #444;
        }
        .episode img {
            width: 100px;
            height: 60px;
            margin-right: 10px;
            border-radius: 5px;
        }
        .episode-title {
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="title">Titulo de la Serie</div>
    <div class="player-container">
        <div class="video-bg" id="videoBg"></div>
        <video id="videoPlayer" controls>
            <source src="https://pomf2.lain.la/f/r640sen8.mp4" type="video/mp4">
            Tu navegador no soporta el video.
        </video>
    </div>
    
    <div class="episodes">
        <div class="episode" onclick="playEpisode('https://pomf2.lain.la/f/7qle1cym.mp4')">
            <img src="capitulo1.jpg" alt="Episodio 1">
            <div class="episode-title">Episodio 1</div>
        </div>
        <div class="episode" onclick="playEpisode('video2.mp4')">
            <img src="capitulo2.jpg" alt="Episodio 2">
            <div class="episode-title">Episodio 2</div>
        </div>
        <div class="episode" onclick="playEpisode('video3.mp4')">
            <img src="capitulo3.jpg" alt="Episodio 3">
            <div class="episode-title">Episodio 3</div>
        </div>
    </div>
    
    <script>
        const video = document.getElementById("videoPlayer");
        const bgImage = document.getElementById("videoBg");

        video.addEventListener("play", () => {
            bgImage.classList.add("hidden");
        });
        
        video.addEventListener("ended", () => {
            bgImage.classList.remove("hidden");
        });

        function playEpisode(videoSrc) {
            video.src = videoSrc;
            video.play();
        }
    </script>
</body>
</html>
